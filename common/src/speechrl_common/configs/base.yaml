# Base Hydra config shared by all four works. Each work composes on top of this
# via its own configs/config.yaml `defaults:` list.
seed: 42

paths:
  data_dir: ${oc.env:SPEECHRL_DATA_DIR,~/speechrl-data/datasets}
  ckpt_dir: ${oc.env:SPEECHRL_CKPT_DIR,~/speechrl-data/checkpoints}
  mlflow_dir: ${oc.env:SPEECHRL_MLFLOW_DIR,~/speechrl-data/mlruns}

tracking:
  backend: mlflow        # local file store; no server required
  experiment: ${work_name}

model:
  id: Qwen/Qwen2-Audio-7B-Instruct
  dtype: bfloat16
  attn_implementation: flash_attention_2

hydra:
  run:
    dir: outputs/${work_name}/${now:%Y-%m-%d_%H-%M-%S}
